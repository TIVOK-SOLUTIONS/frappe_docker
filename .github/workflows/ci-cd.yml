name: Build & Push

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─── Required GitHub secrets ────────────────────────────────────────────────
#
# Repository-level (Settings → Secrets → Actions):
#
#   APPS_PAT   Fine-grained PAT for cloning ipstc and ipstc-hrms.
#              Required only when those repos are private.
#              Create at: GitHub → Settings → Developer settings →
#                         Personal access tokens → Fine-grained
#              Resource owner : TIVOK-SOLUTIONS
#              Repository access: ipstc + ipstc-hrms
#              Permissions: Contents → Read-only
#
#              Branch mapping is automatic:
#                develop branch  →  ipstc@develop  + ipstc_hrms@develop
#                main branch     →  ipstc@main     + ipstc_hrms@main
#
#              The PAT is injected via BuildKit secret mount — never baked
#              into any image layer or visible in docker history.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install MariaDB client
        run: sudo apt-get install -y mariadb-client

      - name: Setup bench
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation --skip-assets \
            --python "$(which python)" --frappe-branch version-16 ~/frappe-bench
          mariadb --host 127.0.0.1 --port 3306 -u root -proot \
            -e "SET GLOBAL character_set_server = 'utf8mb4'"
          mariadb --host 127.0.0.1 --port 3306 -u root -proot \
            -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci'"

      - name: Install apps
        working-directory: /home/runner/frappe-bench
        env:
          APPS_PAT: ${{ secrets.APPS_PAT }}
          CUSTOM_BRANCH: ${{ github.ref_name == 'develop' && 'develop' || 'main' }}
          CI: 'Yes'
        run: |
          bench get-app erpnext --branch version-16
          bench get-app hrms https://github.com/frappe/hrms --branch version-16
          bench get-app ipstc \
            https://${APPS_PAT}@github.com/TIVOK-SOLUTIONS/ipstc \
            --branch ${CUSTOM_BRANCH}
          bench get-app ipstc_hrms \
            https://${APPS_PAT}@github.com/TIVOK-SOLUTIONS/ipstc-hrms \
            --branch ${CUSTOM_BRANCH}
          bench setup requirements
          bench new-site --db-root-password root --admin-password admin test_site
          bench --site test_site install-app erpnext
          bench --site test_site install-app hrms
          bench --site test_site install-app ipstc
          bench --site test_site install-app ipstc_hrms

      - name: Run Tests
        working-directory: /home/runner/frappe-bench
        env:
          TYPE: server
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app ipstc_hrms

  build-and-push:
    name: Build & Push
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve lowercase image name
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Generate apps.json
        id: apps
        env:
          APPS_PAT: ${{ secrets.APPS_PAT }}
        run: |
          CUSTOM_BRANCH=$([[ "${{ github.ref_name }}" == "develop" ]] && echo "develop" || echo "main")

          if [ -n "$APPS_PAT" ]; then
            PREFIX="https://${APPS_PAT}@github.com/TIVOK-SOLUTIONS"
          else
            PREFIX="https://github.com/TIVOK-SOLUTIONS"
          fi

          cat > /tmp/apps.json <<EOF
          [
            {"url": "https://github.com/frappe/erpnext",    "branch": "version-16"},
            {"url": "https://github.com/frappe/hrms",        "branch": "version-16"},
            {"url": "${PREFIX}/ipstc.git",                   "branch": "${CUSTOM_BRANCH}"},
            {"url": "${PREFIX}/ipstc-hrms.git",              "branch": "${CUSTOM_BRANCH}"}
          ]
          EOF

          HASH=$(sha256sum /tmp/apps.json | cut -d' ' -f1)
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "apps.json written (branch: ${CUSTOM_BRANCH}, hash: ${HASH})"
          echo "size: $(wc -c < /tmp/apps.json) bytes"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/custom/Containerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          build-args: |
            FRAPPE_BRANCH=version-16
            FRAPPE_PATH=https://github.com/frappe/frappe
            CACHE_BUST=${{ steps.apps.outputs.hash }}
          secret-files: |
            apps_json=/tmp/apps.json
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Smoke Test
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify all apps are installed
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image }}:${{ github.sha }}"
          docker pull "$IMAGE"
          docker run --rm --entrypoint bash "$IMAGE" -lc '
            for app in frappe erpnext hrms ipstc ipstc_hrms; do
              dir="/home/frappe/frappe-bench/apps/$app"
              if [ -d "$dir" ]; then
                echo "OK  $app"
              else
                echo "MISSING  $app" >&2
                exit 1
              fi
            done
          '